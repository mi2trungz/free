<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Đăng Nhập Netflix từ Cookie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/nf/styles.css">
    <style>
        .tool-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .tool-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-base);
            text-align: center;
        }

        .tool-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .cookie-textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .device-select {
            padding: 12px;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-base);
            color: var(--text-base);
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .device-select:focus {
            border-color: var(--primary);
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: var(--radius-base);
            display: none;
        }

        .result-box.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .result-box.active {
            display: block;
        }

        .result-label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: var(--text-base);
        }

        .result-box.error .result-label {
            color: var(--danger);
        }

        .result-link {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-base);
            color: var(--text-base);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .copy-btn {
            width: 100%;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        .btn:disabled .loading-spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer bg-noise"></div>
    <div class="bg-layer bg-vignette"></div>
    <div class="bg-layer bg-neon"></div>

    <main class="nf-shell">
        <div class="tool-container">
            <h1 class="tool-title">Tạo Link Đăng Nhập Trực Tiếp</h1>
            <p class="tool-desc">Dán chuỗi cookie (hoặc chỉ phần <code>NetflixId=...</code>) vào ô bên dưới để tạo link
                đăng nhập tự động ứng với thiết bị bạn chọn.</p>

            <form id="linkGeneratorForm">
                <div class="input-group">
                    <textarea id="cookieInput" class="text-input cookie-textarea"
                        placeholder="Dán cookie Netflix vào đây...&#10;Ví dụ: NetflixId=v%3D2%...; SecureNetflixId=v%3D2%...;"
                        required></textarea>

                    <select id="deviceSelect" class="device-select">
                        <option value="desktop">Máy tính (Desktop / Web)</option>
                        <option value="mobile">Điện thoại (Mobile App)</option>
                        <option value="tv">Tivi (Smart TV)</option>
                    </select>
                </div>

                <button type="submit" id="generateBtn" class="btn btn-primary" style="width: 100%">
                    <span class="loading-spinner"></span>
                    Tạo Link Đăng Nhập
                </button>
            </form>

            <div id="resultBox" class="result-box">
                <span id="resultLabel" class="result-label">Link Đăng Nhập Của Bạn:</span>
                <input type="text" id="resultLink" class="result-link" readonly>
                <div style="display: flex; gap: 8px;">
                    <button type="button" id="copyResultBtn" class="btn btn-primary copy-btn" style="flex: 1;">Sao Chép
                        Link</button>
                    <a id="openResultBtn" href="#" target="_blank" class="btn btn-ghost"
                        style="flex: 1; text-align: center;">Mở Thử</a>
                </div>
            </div>

            <div id="accountInfoBox" class="result-box"
                style="margin-top: 16px; background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3);">
                <span class="result-label" style="color: var(--info);">Thông Tin Tài Khoản:</span>
                <div id="accountInfoContent" style="font-size: 0.9rem; line-height: 1.6; color: var(--text-base);">
                </div>
            </div>

            <div id="errorBox" class="result-box error">
                <span class="result-label">Lỗi:</span>
                <p id="errorText" style="margin:0; font-size: 0.9rem;"></p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('linkGeneratorForm');
            const cookieInput = document.getElementById('cookieInput');
            const deviceSelect = document.getElementById('deviceSelect');
            const generateBtn = document.getElementById('generateBtn');
            const resultBox = document.getElementById('resultBox');
            const resultLink = document.getElementById('resultLink');
            const copyResultBtn = document.getElementById('copyResultBtn');
            const openResultBtn = document.getElementById('openResultBtn');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const accountInfoBox = document.getElementById('accountInfoBox');
            const accountInfoContent = document.getElementById('accountInfoContent');

            function showResult(url, accountInfo) {
                resultBox.classList.add('active');
                errorBox.classList.remove('active');
                resultLink.value = url;
                openResultBtn.href = url;

                if (accountInfo) {
                    accountInfoBox.classList.add('active');
                    accountInfoContent.innerHTML = `
                        <div style="display: grid; grid-template-columns: auto 1fr; gap: 4px 12px;">
                            <strong>Trạng thái:</strong> <span>${accountInfo.ok ? '✅ Hoạt động' : '❌ Lỗi'}</span>
                            <strong>Gói cước:</strong> <span>${accountInfo.plan || 'Không rõ'} ${accountInfo.premium ? '(Premium)' : ''}</span>
                            <strong>Quốc gia:</strong> <span>${accountInfo.country || 'N/A'}</span>
                            <strong>Màn hình:</strong> <span>${accountInfo.max_streams || '?'} màn</span>
                            <strong>Giá gói:</strong> <span>${accountInfo.plan_price || 'N/A'}</span>
                            <strong>Ngày lập:</strong> <span>${accountInfo.member_since || 'N/A'}</span>
                            <strong>Thanh toán:</strong> <span>${accountInfo.payment_method || 'N/A'}</span>
                            <strong>Phone:</strong> <span>${accountInfo.phone || 'N/A'} (Verified: ${accountInfo.phone_verified || 'No'})</span>
                            <strong>Email:</strong> <span>${(accountInfo.email || 'N/A').replace(/\\x40/g, '@')} (Verified: ${accountInfo.email_verified || 'No'})</span>
                            <strong>Chất lượng video:</strong> <span>${accountInfo.video_quality || 'N/A'}</span>
                            <strong>Payment Hold:</strong> <span>${accountInfo.on_payment_hold || 'No'}</span>
                            <strong>Thành viên phụ:</strong> <span>${accountInfo.extra_member || 'No'}</span>
                            <strong>Profiles:</strong> <span>${accountInfo.profiles || '?'}</span>
                            <strong>Gia hạn tới:</strong> <span>${accountInfo.next_billing || 'N/A'}</span>
                        </div>
                    `;
                } else {
                    accountInfoBox.classList.remove('active');
                }
            }

            function showError(msg) {
                errorBox.classList.add('active');
                resultBox.classList.remove('active');
                accountInfoBox.classList.remove('active');
                errorText.textContent = msg;
            }

            function hideAlerts() {
                resultBox.classList.remove('active');
                errorBox.classList.remove('active');
                accountInfoBox.classList.remove('active');
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideAlerts();

                const cookieStr = cookieInput.value.trim();
                const device = deviceSelect.value;

                if (!cookieStr) {
                    showError('Vui lòng nhập cookie.');
                    return;
                }

                generateBtn.disabled = true;

                try {
                    const res = await fetch('/api/nf-cookie-to-link', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cookieStr, device })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'Server error');
                    }

                    if (data.success && data.url) {
                        showResult(data.url, data.accountInfo);
                    } else {
                        showError('Không thể tạo link (Lỗi không xác định).');
                    }

                } catch (error) {
                    showError(error.message);
                } finally {
                    generateBtn.disabled = false;
                }
            });

            copyResultBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(resultLink.value);
                    const originalText = copyResultBtn.textContent;
                    copyResultBtn.textContent = 'Đã sao chép!';
                    setTimeout(() => {
                        copyResultBtn.textContent = originalText;
                    }, 2000);
                } catch (err) {
                    alert('Lỗi sao chép, vui lòng copy thủ công.');
                }
            });
        });
    </script>
</body>

</html>
