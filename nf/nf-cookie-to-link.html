<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Đăng Nhập Netflix từ Cookie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/nf/styles.css">
    <script src="/nf/firebase-runtime-config.js"></script>
    <style>
        .tool-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .tool-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-base);
            text-align: center;
        }

        .tool-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .tool-layout {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 16px;
            align-items: start;
        }

        .left-panel,
        .right-panel {
            min-width: 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .cookie-textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .device-select {
            padding: 12px;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-base);
            color: var(--text-base);
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .device-select:focus {
            border-color: var(--primary);
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .import-state {
            margin-top: 8px;
            min-height: 20px;
            font-size: 0.86rem;
            color: var(--text-muted);
        }

        .import-state.ok {
            color: #34d399;
        }

        .import-state.bad {
            color: #f87171;
        }

        .result-box {
            margin-top: 16px;
            padding: 16px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: var(--radius-base);
            display: none;
        }

        .result-box.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .result-box.active {
            display: block;
        }

        .result-label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: var(--text-base);
        }

        .result-box.error .result-label {
            color: var(--danger);
        }

        .result-link {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-base);
            color: var(--text-base);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .copy-btn {
            width: 100%;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        .btn:disabled .loading-spinner {
            display: inline-block;
        }

        .account-box {
            display: block;
            margin-top: 0;
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            min-height: 520px;
        }

        .account-placeholder {
            padding: 14px;
            border: 1px dashed rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            color: #bfdbfe;
            background: rgba(30, 41, 59, 0.4);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .account-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .account-row {
            display: grid;
            grid-template-columns: 160px minmax(0, 1fr);
            gap: 10px 12px;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(148, 163, 184, 0.18);
        }

        .account-row:last-child {
            border-bottom: 0;
        }

        .account-row strong {
            color: #c9d8ff;
            font-weight: 700;
        }

        .account-row span {
            color: #e8efff;
            font-weight: 500;
            overflow-wrap: anywhere;
        }

        .account-row.priority {
            padding: 7px 10px;
            border: 1px solid rgba(59, 130, 246, 0.42);
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(30, 64, 175, 0.14));
            box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.1);
        }

        .account-row.priority strong {
            color: #dbeafe;
        }

        .account-row.priority span {
            color: #eff6ff;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .tool-layout {
                grid-template-columns: 1fr;
            }

            .account-box {
                min-height: 0;
            }
        }

        @media (max-width: 640px) {
            .action-row {
                grid-template-columns: 1fr;
            }

            .account-row {
                grid-template-columns: 1fr;
                gap: 2px;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer bg-noise"></div>
    <div class="bg-layer bg-vignette"></div>
    <div class="bg-layer bg-neon"></div>

    <main class="nf-shell">
        <div class="tool-container">
            <h1 class="tool-title">Tạo Link Đăng Nhập Trực Tiếp</h1>
            <p class="tool-desc">Dán chuỗi cookie (hoặc chỉ phần <code>NetflixId=...</code>) vào ô bên dưới để tạo link
                đăng nhập tự động ứng với thiết bị bạn chọn.</p>

            <div class="tool-layout">
                <section class="left-panel">
                    <form id="linkGeneratorForm">
                        <div class="input-group">
                            <textarea id="cookieInput" class="text-input cookie-textarea"
                                placeholder="Dán cookie Netflix vào đây...&#10;Ví dụ: NetflixId=v%3D2%...; SecureNetflixId=v%3D2%...;"
                                required></textarea>

                            <select id="deviceSelect" class="device-select">
                                <option value="desktop">Máy tính (Desktop / Web)</option>
                                <option value="mobile">Điện thoại (Mobile App)</option>
                                <option value="tv">Tivi (Smart TV)</option>
                            </select>
                        </div>

                        <div class="action-row">
                            <button type="submit" id="generateBtn" class="btn btn-primary">
                                <span class="loading-spinner"></span>
                                Tạo Link Đăng Nhập
                            </button>
                            <button type="button" id="importBtn" class="btn btn-ghost">Import Cookie</button>
                        </div>
                        <p id="importState" class="import-state"></p>
                    </form>

                    <div id="resultBox" class="result-box">
                        <span id="resultLabel" class="result-label">Link Đăng Nhập Của Bạn:</span>
                        <input type="text" id="resultLink" class="result-link" readonly>
                        <div style="display: flex; gap: 8px;">
                            <button type="button" id="copyResultBtn" class="btn btn-primary copy-btn" style="flex: 1;">Sao Chép
                                Link</button>
                            <a id="openResultBtn" href="#" target="_blank" class="btn btn-ghost"
                                style="flex: 1; text-align: center;">Mở Thử</a>
                        </div>
                    </div>
                </section>

                <section class="right-panel">
                    <div id="accountInfoBox" class="result-box active account-box">
                        <span class="result-label" style="color: var(--info);">Thông Tin Tài Khoản:</span>
                        <div id="accountInfoContent" style="font-size: 0.9rem; line-height: 1.6; color: var(--text-base);">
                            <div class="account-placeholder">Chưa có dữ liệu, hãy tạo link để xem thông tin tài khoản.</div>
                        </div>
                    </div>
                </section>
            </div>

            <div id="errorBox" class="result-box error">
                <span class="result-label">Lỗi:</span>
                <p id="errorText" style="margin:0; font-size: 0.9rem;"></p>
            </div>
        </div>
    </main>

    <script type="module">
        import { firebaseImportCookies } from '/nf/firebase-client.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('linkGeneratorForm');
            const cookieInput = document.getElementById('cookieInput');
            const deviceSelect = document.getElementById('deviceSelect');
            const generateBtn = document.getElementById('generateBtn');
            const importBtn = document.getElementById('importBtn');
            const importState = document.getElementById('importState');
            const resultBox = document.getElementById('resultBox');
            const resultLink = document.getElementById('resultLink');
            const copyResultBtn = document.getElementById('copyResultBtn');
            const openResultBtn = document.getElementById('openResultBtn');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const accountInfoContent = document.getElementById('accountInfoContent');

            function setImportState(text = '', mode = '') {
                importState.textContent = text;
                importState.className = `import-state ${mode}`.trim();
            }

            function renderAccountPlaceholder() {
                accountInfoContent.innerHTML = '<div class="account-placeholder">Chưa có dữ liệu, hãy tạo link để xem thông tin tài khoản.</div>';
            }

            function renderAccountInfo(accountInfo) {
                const statusText = accountInfo.ok ? '✅ Hoạt động' : '❌ Lỗi';
                const planText = `${accountInfo.plan || 'Không rõ'} ${accountInfo.premium ? '(Premium)' : ''}`.trim();
                const phoneText = `${accountInfo.phone || 'N/A'} (Verified: ${accountInfo.phone_verified || 'No'})`;
                const emailText = `${(accountInfo.email || 'N/A').replace(/\\x40/g, '@')} (Verified: ${accountInfo.email_verified || 'No'})`;
                const priorityRows = [
                    { label: 'Trạng thái:', value: statusText, priority: true },
                    { label: 'Gói cước:', value: planText, priority: true },
                    { label: 'Quốc gia:', value: accountInfo.country || 'N/A', priority: true },
                    { label: 'Màn hình:', value: `${accountInfo.max_streams || '?'} màn`, priority: true },
                    { label: 'Chất lượng video:', value: accountInfo.video_quality || 'N/A', priority: true },
                    { label: 'Payment Hold:', value: accountInfo.on_payment_hold || 'No', priority: true }
                ];
                const normalRows = [
                    { label: 'Giá gói:', value: accountInfo.plan_price || 'N/A' },
                    { label: 'Ngày lập:', value: accountInfo.member_since || 'N/A' },
                    { label: 'Thanh toán:', value: accountInfo.payment_method || 'N/A' },
                    { label: 'Phone:', value: phoneText },
                    { label: 'Email:', value: emailText },
                    { label: 'Thành viên phụ:', value: accountInfo.extra_member || 'No' },
                    { label: 'Profiles:', value: accountInfo.profiles || '?' },
                    { label: 'Gia hạn tới:', value: accountInfo.next_billing || 'N/A' }
                ];
                const rows = [...priorityRows, ...normalRows];

                accountInfoContent.innerHTML = `
                    <div class="account-grid">
                        ${rows.map((row) => `
                            <div class="account-row${row.priority ? ' priority' : ''}">
                                <strong>${row.label}</strong>
                                <span>${row.value}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            function showResult(url, accountInfo) {
                resultBox.classList.add('active');
                errorBox.classList.remove('active');
                resultLink.value = url;
                openResultBtn.href = url;

                if (accountInfo) {
                    renderAccountInfo(accountInfo);
                } else {
                    renderAccountPlaceholder();
                }
            }

            function showError(msg) {
                errorBox.classList.add('active');
                resultBox.classList.remove('active');
                errorText.textContent = msg;
            }

            function hideAlerts() {
                resultBox.classList.remove('active');
                errorBox.classList.remove('active');
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideAlerts();
                setImportState('');

                const cookieStr = cookieInput.value.trim();
                const device = deviceSelect.value;

                if (!cookieStr) {
                    showError('Vui lòng nhập cookie.');
                    return;
                }

                generateBtn.disabled = true;

                try {
                    const res = await fetch('/api/nf-cookie-to-link', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cookieStr, device })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'Server error');
                    }

                    if (data.success && data.url) {
                        showResult(data.url, data.accountInfo);
                    } else {
                        showError('Không thể tạo link (Lỗi không xác định).');
                    }
                } catch (error) {
                    showError(error.message);
                } finally {
                    generateBtn.disabled = false;
                }
            });

            importBtn.addEventListener('click', async () => {
                const content = cookieInput.value.trim();
                setImportState('');
                errorBox.classList.remove('active');

                if (!content) {
                    setImportState('Vui lòng dán cookie trước khi import.', 'bad');
                    return;
                }

                importBtn.disabled = true;
                const originalText = importBtn.textContent;
                importBtn.textContent = 'Đang import...';

                try {
                    const data = await firebaseImportCookies(content);

                    const added = Number(data.addedCount || 0);
                    const skipped = Number(data.skippedCount || 0);
                    const invalid = Number(data.invalidCount || 0);
                    setImportState(`Import xong: thêm ${added}, trùng ${skipped}, lỗi ${invalid}.`, 'ok');
                } catch (error) {
                    setImportState(error.message || 'Import thất bại.', 'bad');
                } finally {
                    importBtn.disabled = false;
                    importBtn.textContent = originalText;
                }
            });

            copyResultBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(resultLink.value);
                    const originalText = copyResultBtn.textContent;
                    copyResultBtn.textContent = 'Đã sao chép!';
                    setTimeout(() => {
                        copyResultBtn.textContent = originalText;
                    }, 2000);
                } catch (err) {
                    alert('Lỗi sao chép, vui lòng copy thủ công.');
                }
            });

            renderAccountPlaceholder();
        });
    </script>
</body>

</html>
